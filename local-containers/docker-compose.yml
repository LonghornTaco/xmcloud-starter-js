# Linux-only local development stack for the XM Cloud starter kits.
#
# Services:
#   - traefik       Reverse proxy / TLS termination on :443.
#   - mockingbird   YAML-backed Sitecore CM shim that serves a GraphQL
#                   Layout Service from this repo's SCS-serialized YAML.
#                   Drop-in replacement for Experience Edge in local dev,
#                   with a Web UI for editing items, templates, and renderings.
#   - rendering     Next.js dev container that mounts one of the
#                   examples/<starter> directories. Configurable via
#                   STARTER_PATH in .env.
#   - hostswriter   Writes container hostnames to the Windows host's
#                   hosts file (Docker Desktop only) so devs can hit
#                   https://nextjs.xmc-starter-js.localhost from a browser.
#
# This stack is Linux-only. The previous Windows-based CM/MSSQL/Solr stack
# has been removed; for local headless dev with a real CM, use a remote
# XM Cloud environment.

services:
  traefik:
    image: ${TRAEFIK_IMAGE}
    container_name: ${COMPOSE_PROJECT_NAME}-traefik
    command:
      - "--ping"
      - "--api.insecure=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.file.directory=/etc/traefik/config/dynamic"
      - "--entryPoints.websecure.address=:443"
      - "--entryPoints.websecure.forwardedHeaders.insecure"
    ports:
      - "443:443"
      - "8079:8080"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/traefik:/etc/traefik

  mockingbird:
    image: ${MOCKINGBIRD_IMAGE}
    container_name: ${COMPOSE_PROJECT_NAME}-mockingbird
    environment:
      PORT: ${MOCKINGBIRD_PORT}
      HOST: 0.0.0.0
      # CDN / Edge base URL prefix for media src attributes.
      MEDIA_BASE_URL: ${MOCKINGBIRD_MEDIA_BASE_URL}
      INDEX_CACHE_PATH: /app/data/cache/index.json.gz
      # Per-request site routing: ?site=<name> > Host: header > null.
      # No env pin needed: the SDK's multisite proxy passes ?site=, and
      # mockingbird derives the site list from Site Grouping items in
      # the corpus at boot via siteInfoCollection.
    volumes:
      # SCS root config - the same file `dotnet sitecore` reads.
      - ${MOCKINGBIRD_SITECORE_JSON}:/app/data/sitecore.json
      # Dev-authored templates, renderings, layouts, branch templates -
      # committed to the repo.
      - ${MOCKINGBIRD_SERIALIZATION_PATH}:/app/data/serialization
      # Optional second SCS root for content-item YAMLs that aren't in the repo.
      - ${MOCKINGBIRD_CONTENT_PATH}:/app/data/content
      # Engine-internal parsed-item index cache. Safe to delete; rebuilds on boot.
      - ${MOCKINGBIRD_CACHE_PATH}:/app/data/cache
    networks:
      default:
        aliases:
          - ${MOCKINGBIRD_HOST}
          - mockingbird
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mockingbird-secure.rule=Host(`${MOCKINGBIRD_HOST}`)"
      - "traefik.http.routers.mockingbird-secure.entrypoints=websecure"
      - "traefik.http.routers.mockingbird-secure.tls=true"
      - "traefik.http.services.mockingbird.loadbalancer.server.port=${MOCKINGBIRD_PORT}"

  rendering:
    image: ${COMPOSE_PROJECT_NAME}-rendering:${VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME}-rendering
    build:
      context: ./docker/build/rendering-nextjs
      target: ${BUILD_CONFIGURATION}
      args:
        PARENT_IMAGE: ${NODEJS_PARENT_IMAGE}
    ports:
      - "3000:3000"
    # Named volume masks /app/node_modules so linux-native npm installs
    # never touch the host's node_modules. First boot populates the empty
    # node_modules volume; subsequent boots reuse it.
    volumes:
      - ${STARTER_PATH}:/app
      - rendering-node-modules:/app/node_modules
    environment:
      # Server-side fetches hit mockingbird directly via docker DNS.
      # Use the Experience-Edge-shaped path; it's the public-facing endpoint
      # that Mockingbird supports as a stable contract.
      NEXT_PUBLIC_SITECORE_API_HOST: "http://mockingbird:${MOCKINGBIRD_PORT}"
      NEXT_PUBLIC_SITECORE_API_KEY: ${SITECORE_API_KEY}
      GRAPH_QL_ENDPOINT: "http://mockingbird:${MOCKINGBIRD_PORT}/sitecore/api/graph/edge"
      # Clear Edge Context so the SDK uses the local API host above.
      SITECORE_EDGE_CONTEXT_ID: ""
      NEXT_PUBLIC_SITECORE_EDGE_CONTEXT_ID: ""
      NEXT_PUBLIC_DEFAULT_SITE_NAME: ${NEXT_PUBLIC_DEFAULT_SITE_NAME}
      NEXT_PUBLIC_DEFAULT_LANGUAGE: ${NEXT_PUBLIC_DEFAULT_LANGUAGE}
      SITECORE_EDITING_SECRET: ${SITECORE_EDITING_SECRET}
      PUBLIC_URL: "https://${RENDERING_HOST_NEXTJS}"
      NEXTJS_DIST_DIR: ".next-container"
      DISABLE_SSG_FETCH: ${DISABLE_SSG_FETCH}
    networks:
      default:
        aliases:
          - ${RENDERING_HOST_NEXTJS}
    depends_on:
      - mockingbird
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rendering-secure.rule=Host(`${RENDERING_HOST_NEXTJS}`)"
      - "traefik.http.routers.rendering-secure.entrypoints=websecure"
      - "traefik.http.routers.rendering-secure.tls=true"
      - "traefik.http.services.rendering.loadbalancer.server.port=3000"

  hostswriter:
    image: ${WHW_IMAGE}
    container_name: ${COMPOSE_PROJECT_NAME}-hostswriter
    volumes:
      # Linux whw binary defaults to /host-etc/hosts.
      # Mount the Windows hosts dir via Docker Desktop path translation.
      - C:/Windows/System32/drivers/etc:/host-etc
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Docker-internal IPs are unreachable from the Windows host on Docker
      # Desktop's linux engine; terminate at 127.0.0.1 where traefik is
      # port-forwarded. Lowercase name is required: whw's Linux build reads
      # "termination_map" (Linux env vars are case-sensitive).
      termination_map: rendering,mockingbird:loopback

volumes:
  rendering-node-modules:
